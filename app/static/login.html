<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 运行环境检查系统</title>
    <style>
        :root {
            --bg-deep: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        /* 装饰背景圆 */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.1));
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: drift 20s infinite alternate;
        }

        @keyframes drift {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-box {
            width: 64px;
            height: 64px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: var(--primary);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header p {
            color: var(--text-dim);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            animation: slideDown 0.3s ease-out;
            line-height: 1.4;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .footer-links {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        /* 加载动画 */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                border: none;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="orb"></div>
    
    <div class="login-card">
        <div class="login-header">
            <div class="logo-box">🛡️</div>
            <h1 id="formTitle">进入主控台</h1>
            <p id="formSubtitle">请输入您的凭据以访问系统</p>
        </div>

        <div id="alertError" class="alert alert-error"></div>
        <div id="alertSuccess" class="alert alert-success"></div>

        <!-- 登录表单 -->
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" required 
                           placeholder="输入系统账号" autocomplete="username" spellcheck="false">
                </div>
            </div>

            <div class="form-group">
                <label for="password">安全密码</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" required 
                           placeholder="输入认证密码" autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span id="loginBtnText">验证通过并登录</span>
                <div class="spinner" id="loginBtnSpinner"></div>
            </button>
        </form>

        <!-- 注册表单 (初始隐藏) -->
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="regUsername">用户名</label>
                <div class="input-wrapper">
                    <input type="text" id="regUsername" name="username" required 
                           placeholder="设置系统账号" autocomplete="username" spellcheck="false">
                </div>
            </div>

            <div class="form-group">
                <label for="regPassword">安全密码</label>
                <div class="input-wrapper">
                    <input type="password" id="regPassword" name="password" required 
                           placeholder="设置认证密码" autocomplete="new-password">
                </div>
            </div>

            <div class="form-group">
                <label for="regConfirmPassword">确认密码</label>
                <div class="input-wrapper">
                    <input type="password" id="regConfirmPassword" name="confirm_password" required 
                           placeholder="再次输入密码" autocomplete="new-password">
                </div>
            </div>

            <button type="submit" class="btn-login" id="registerBtn">
                <span id="regBtnText">提交注册申请</span>
                <div class="spinner" id="regBtnSpinner"></div>
            </button>
        </form>

        <div class="footer-links">
            <div id="toggleLinkContainer">
                还没有账号？<a href="javascript:void(0)" onclick="toggleMode('register')">点击注册</a>
            </div>
            <div id="backToLoginContainer" style="display: none;">
                已有账号？<a href="javascript:void(0)" onclick="toggleMode('login')">返回登录</a>
            </div>
            <div style="margin-top: 15px; opacity: 0.5;">
                <span style="color: rgba(255,255,255,0.1); margin: 0 12px;">|</span>
                <a href="/docs" target="_blank">平台准则 (Docs)</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const alertError = document.getElementById('alertError');
        const alertSuccess = document.getElementById('alertSuccess');
        
        let currentMode = 'login';

        function toggleMode(mode) {
            currentMode = mode;
            alertError.style.display = 'none';
            alertSuccess.style.display = 'none';
            
            if (mode === 'register') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                document.getElementById('formTitle').textContent = '创建新账号';
                document.getElementById('formSubtitle').textContent = '申请加入环境检查系统';
                document.getElementById('toggleLinkContainer').style.display = 'none';
                document.getElementById('backToLoginContainer').style.display = 'block';
            } else {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                document.getElementById('formTitle').textContent = '进入主控台';
                document.getElementById('formSubtitle').textContent = '请输入您的凭据以访问系统';
                document.getElementById('toggleLinkContainer').style.display = 'block';
                document.getElementById('backToLoginContainer').style.display = 'none';
            }
        }

        // 登录处理
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            setBtnLoading('login', true);
            alertError.style.display = 'none';

            try {
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);

                const response = await fetch(`${API_BASE}/api/v1/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', username);
                    alertSuccess.textContent = '验证通过，准备进入系统...';
                    alertSuccess.style.display = 'block';
                    setTimeout(() => window.location.href = '/dashboard.html', 800);
                } else {
                    throw new Error(data.detail || '用户名或密码错误');
                }
            } catch (error) {
                showError(error.message);
                setBtnLoading('login', false);
            }
        });

        // 注册处理
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;

            if (password !== confirm) {
                showError('两次输入的密码不一致');
                return;
            }

            setBtnLoading('register', true);
            alertError.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/api/v1/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alertSuccess.innerHTML = '<strong>申请提交成功！</strong><br>您的账号目前处于未激活状态，请联系管理员审批通过后再登录。';
                    alertSuccess.style.display = 'block';
                    registerForm.reset();
                    setTimeout(() => toggleMode('login'), 3000);
                } else {
                    throw new Error(data.detail || '注册申请失败，请稍后重试');
                }
            } catch (error) {
                showError(error.message);
            } finally {
                setBtnLoading('register', false);
            }
        });

        function setBtnLoading(type, isLoading) {
            const btn = document.getElementById(type === 'login' ? 'loginBtn' : 'registerBtn');
            const text = document.getElementById(type === 'login' ? 'loginBtnText' : 'regBtnText');
            const spinner = document.getElementById(type === 'login' ? 'loginBtnSpinner' : 'regBtnSpinner');
            
            btn.disabled = isLoading;
            spinner.style.display = isLoading ? 'block' : 'none';
            if (!isLoading) {
                text.textContent = type === 'login' ? '验证通过并登录' : '提交注册申请';
            } else {
                text.textContent = type === 'login' ? '正在认证...' : '正在提交...';
            }
        }

        function showError(msg) {
            alertError.textContent = msg;
            alertError.style.display = 'block';
            window.scrollTo(0, 0);
        }

        document.addEventListener('mousemove', (e) => {
            const orb = document.querySelector('.orb');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            orb.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
