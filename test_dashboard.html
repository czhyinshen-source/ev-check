<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .header {
            background: #1E3A8A;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #1976d2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        #debug-output {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 3px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>测试页面</h1>
        <div>
            <span id="currentUser">用户: -</span>
            <button onclick="logout()">退出</button>
        </div>
    </div>

    <div class="test-section">
        <h2>用户信息测试</h2>
        <button onclick="checkUser()">��查用户信息</button>
        <button onclick="setTestUser()">设置测试用户</button>
        <button onclick="clearUser()">清除用户</button>
    </div>

    <div class="test-section">
        <h2>调试输出</h2>
        <div id="debug-output"></div>
    </div>

    <script>
        const debugOutput = document.getElementById('debug-output');

        function log(msg) {
            const timestamp = new Date().toLocaleTimeString();
            debugOutput.textContent = `[${timestamp}] ${msg}\n` + debugOutput.textContent;
            console.log(msg);
        }

        function checkUser() {
            log('=== 检查用户信息 ===');
            const username = localStorage.getItem('username');
            const token = localStorage.getItem('token');

            log(`Token: ${token ? '存在 (' + token.substring(0, 10) + '...)' : '不存在'}`);
            log(`Username: ${username || '不存在'}`);

            const currentUserEl = document.getElementById('currentUser');
            if (currentUserEl) {
                log(`当前显示: ${currentUserEl.textContent}`);
                currentUserEl.textContent = '用户: ' + (username || '未知');
                log(`更新后显示: ${currentUserEl.textContent}`);
            } else {
                log('错误: currentUser 元素不存在!');
            }
        }

        function setTestUser() {
            log('=== 设置测试用户 ===');
            localStorage.setItem('token', 'test_token_12345');
            localStorage.setItem('username', '测试用户');
            log('已设置测试用户');
            checkUser();
        }

        function clearUser() {
            log('=== 清除用户 ===');
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            log('已清除用户数据');
            checkUser();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            alert('已退出登录');
            checkUser();
        }

        // 页面加载时自动检查
        document.addEventListener('DOMContentLoaded', () => {
            log('页面 DOMContentLoaded 事件触发');
            checkUser();
        });

        // 另一个检查时机
        window.addEventListener('load', () => {
            log('页面 load 事件触发');
        });
    </script>
</body>
</html>
